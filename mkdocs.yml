site_name: 生物分類技能検定2級 植物部門 完全攻略ガイド
site_url: https://bob-takuya.github.io/plant-taxonomy-guide/
repo_url: https://github.com/bob-takuya/plant-taxonomy-guide
repo_name: plant-taxonomy-guide
docs_dir: .
site_dir: ../site_output

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - toc:
      permalink: true
  - tables
  - attr_list

